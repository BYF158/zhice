<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小核 - AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: #f9f9f9;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            transition: transform 0.3s;
            z-index: 100;
        }

        .sidebar.collapsed {
            transform: translateX(-260px);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e5e5e5;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1a1a1a;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: #f0f0f0;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: #f0f0f0;
        }

        .history-item.active {
            background: #e8e8e8;
            color: #1a1a1a;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #e5e5e5;
        }

        .sidebar-footer button {
            width: 100%;
            padding: 10px;
            background: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            text-align: left;
            transition: all 0.2s;
        }

        .sidebar-footer button:hover {
            background: #f0f0f0;
        }

        /* 主内容区域 */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: margin-left 0.3s;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* 顶部栏 */
        .top-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e5e5e5;
            background: white;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #666;
            padding: 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #f0f0f0;
        }

        .model-selector {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            font-weight: 500;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            margin-left: 8px;
        }

        .status-indicator.disconnected {
            background: #ef4444;
        }

        /* 消息列表 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 24px 300px;
        }

        .main-content.expanded .messages-container {
            padding-left: 24px;
        }

        .message {
            max-width: 900px;
            margin: 0 0 32px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #555;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 16px;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* 输入区域 */
        .input-container {
            max-width: 900px;
            margin: 0 0 0 300px;
            padding: 16px 24px 24px 0;
            position: relative;
        }

        .main-content.expanded .input-container {
            margin-left: 24px;
        }

        .input-wrapper {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .input-wrapper:focus-within {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border-color: #d1d1d1;
        }

        .textarea-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        /* 按钮工具栏 */
        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }

        .toolbar-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            max-width: 300px;
        }

        .file-preview .file-icon {
            font-size: 18px;
        }

        .file-preview .file-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .file-preview .file-size {
            color: #999;
            font-size: 12px;
            white-space: nowrap;
        }

        .file-preview .remove-file {
            cursor: pointer;
            color: #999;
            padding: 2px;
        }

        .file-preview .remove-file:hover {
            color: #ef4444;
        }

        /* 消息中的文件/图片 */
        .message-file {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .message.user .message-file {
            background: rgba(255,255,255,0.15);
        }

        .message-file img.thumbnail {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .message-file img.thumbnail:hover {
            opacity: 0.85;
        }

        .message-file .file-icon-big {
            font-size: 32px;
        }

        .message-file .file-info {
            flex: 1;
        }

        .message-file .file-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .message-file .file-download {
            font-size: 12px;
            color: #10a37f;
            text-decoration: none;
        }

        .message-file .file-download:hover {
            text-decoration: underline;
        }

        /* 图片预览模态框 */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 300px;
            line-height: 1.6;
            min-height: 60px;
        }

        .input-field::placeholder {
            color: #999;
            font-size: 15px;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: #10a37f;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.5;
            pointer-events: none;
        }

        .send-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .send-btn:hover {
            background: #1a7f64;
        }

        .input-hint {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 12px;
        }

        /* 欢迎界面 */
        .welcome-screen {
            max-width: 900px;
            margin: 0;
            padding: 60px 24px 40px 0;
            text-align: left;
        }

        .welcome-screen h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .welcome-screen p {
            color: #666;
            font-size: 16px;
            margin-bottom: 36px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            margin: 0;
        }

        .suggestion-item {
            padding: 16px;
            background: #f9f9f9;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
            border-color: #d1d1d1;
        }

        .suggestion-title {
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .suggestion-desc {
            font-size: 13px;
            color: #666;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* 连接状态 */
        .connection-status {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            z-index: 1000;
            display: none;
        }

        .connection-status.connected {
            background: #10b981;
            display: block;
        }

        .connection-status.disconnected {
            background: #ef4444;
            display: block;
        }

        .connection-status.connecting {
            background: #f59e0b;
            color: #1a1a1a;
            display: block;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e5e5e5;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d1d1d1;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-260px);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .main-content.collapsed {
                margin-left: 0;
            }

            .messages-container {
                padding: 16px;
                padding-left: 16px !important;
            }

            .input-container {
                margin-left: 0 !important;
                padding: 12px 16px;
            }

            .input-field {
                min-height: 50px;
                font-size: 16px;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .message {
                max-width: 100%;
            }

            .welcome-screen {
                padding: 32px 16px;
            }
        }

        /* 加载中状态 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e5e5;
            border-top-color: #10a37f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
    </div>

    <div class="connection-status" id="connectionStatus">
        连接状态: 未连接
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>+</span>
                新对话
            </button>
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <!-- 历史记录 -->
        </div>
        <div class="sidebar-footer">
            <button onclick="exportChat()">导出对话</button>
            <button onclick="clearHistory()" style="margin-top: 8px;">清空历史</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <select class="model-selector" id="modelSelector">
                <option value="gpt-3.5">小核 AI</option>
            </select>
            <div class="status-indicator" id="statusIndicator"></div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1>小核 AI 助手</h1>
                <p>有什么可以帮助你的？</p>
                <div class="suggestions">
                    <div class="suggestion-item" onclick="useSuggestion('帮我分析这段代码的性能')">
                        <div class="suggestion-title">💻 代码分析</div>
                        <div class="suggestion-desc">帮我分析这段代码的性能</div>
                    </div>
                    <div class="suggestion-item" onclick="useSuggestion('解释一下Java中的异常处理机制')">
                        <div class="suggestion-title">📚 技术问题</div>
                        <div class="suggestion-desc">解释一下Java中的异常处理机制</div>
                    </div>
                    <div class="suggestion-item" onclick="useSuggestion('帮我写一个简单的Python爬虫')">
                        <div class="suggestion-title">🔧 编写代码</div>
                        <div class="suggestion-desc">帮我写一个简单的Python爬虫</div>
                    </div>
                    <div class="suggestion-item" onclick="useSuggestion('如何优化数据库查询性能')">
                        <div class="suggestion-title">🚀 性能优化</div>
                        <div class="suggestion-desc">如何优化数据库查询性能</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <div class="textarea-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="发送消息给小核..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20 7z"/>
                        </svg>
                    </button>
                </div>
                <div class="input-toolbar">
                    <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                        上传文件
                    </button>
                    <div id="filePreviewArea"></div>
                </div>
            </div>
            <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(event)">
            <p class="input-hint">小核AI可能生成不准确的信息，请核实重要内容。</p>
        </div>

    <!-- 图片预览模态框 -->
    <div class="image-modal" id="imageModal" onclick="closeImagePreview()">
        <img id="previewImage" src="" alt="预览">
    </div>
    </div>

    <script>
        // 配置
        const API_BASE_URL = 'http://120.27.244.95:8080';
        
        // 全局变量
        let currentChatId = null;
        let chats = [];
        let isConnected = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            loadChats();
            renderChats();
            
            if (chats.length === 0) {
                createNewChat();
            } else {
                loadChat(chats[0].id);
            }
            
            document.getElementById('loadingScreen').style.display = 'none';
        });
        
        // 连接检查
        async function checkConnection() {
            updateConnectionStatus('connecting', '连接中...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    isConnected = true;
                    updateConnectionStatus('connected', '已连接');
                    document.getElementById('statusIndicator').classList.remove('disconnected');
                }
            } catch (error) {
                isConnected = false;
                updateConnectionStatus('disconnected', '已断开');
                document.getElementById('statusIndicator').classList.add('disconnected');
                setTimeout(checkConnection, 3000);
            }
        }
        
        function updateConnectionStatus(status, message) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = `connection-status ${status}`;
            statusEl.textContent = `连接状态: ${message}`;
            
            if (status === 'connected') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }
        
        // 聊天管理
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: '新对话',
                messages: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderChats();
            loadChat(newChat.id);
        }
        
        function loadChat(chatId) {
            currentChatId = chatId;
            saveChats();
            renderChats();
            renderMessages();
            
            // 移动端自动收起侧边栏
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }
        
        function getCurrentChat() {
            return chats.find(c => c.id === currentChatId);
        }
        
        function deleteChat(chatId) {
            chats = chats.filter(c => c.id !== chatId);
            
            if (currentChatId === chatId) {
                if (chats.length > 0) {
                    currentChatId = chats[0].id;
                } else {
                    createNewChat();
                }
            }
            
            saveChats();
            renderChats();
            renderMessages();
        }
        
        // 消息处理
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            const hasFiles = pendingFiles.length > 0;
            
            if ((!content && !hasFiles) || !isConnected) return;
            
            const chat = getCurrentChat();
            if (!chat) return;
            
            // 构建用户消息（含文件信息）
            let messageContent = content;
            let files = [];
            
            if (hasFiles) {
                // 读取文件内容（小文件直接包含）
                for (const file of pendingFiles) {
                    const base64 = await fileToBase64(file);
                    files.push({
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: base64
                    });
                }
                
                if (content) {
                    messageContent = content;
                } else {
                    messageContent = `[已上传 ${files.length} 个文件]`;
                }
            }
            
            // 添加用户消息
            const userMessage = {
                role: 'user',
                content: messageContent,
                files: files,
                timestamp: new Date().toISOString()
            };
            
            chat.messages.push(userMessage);
            
            // 更新聊天标题
            const titleText = content || (files[0] && '📎 ' + files[0].name) || '新对话';
            if (chat.messages.filter(m => m.role === 'user').length === 1) {
                chat.title = titleText.substring(0, 20) || '新对话';
            }
            
            chat.updatedAt = new Date().toISOString();
            saveChats();
            renderChats();
            renderMessages();
            
            // 清空输入
            input.value = '';
            input.style.height = 'auto';
            pendingFiles = [];
            renderFilePreview();
            updateSendButton();
            
            // 发送到服务器
            try {
                showTypingIndicator();
                
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messageContent,
                        session_id: chat.id,
                        files: files
                    })
                });
                
                if (!response.ok) throw new Error('发送失败');
                
                const data = await response.json();
                
                // 添加AI回复
                const aiMessage = {
                    role: 'assistant',
                    content: data.content,
                    timestamp: data.timestamp
                };
                
                chat.messages.push(aiMessage);
                chat.updatedAt = new Date().toISOString();
                saveChats();
                renderChats();
                renderMessages();
                
            } catch (error) {
                console.error('发送消息失败:', error);
                addSystemMessage('发送失败，请检查网络连接');
            } finally {
                hideTypingIndicator();
            }
        }
        
        // 渲染
        function renderChats() {
            const container = document.getElementById('sidebarContent');
            
            container.innerHTML = chats.map(chat => {
                const isActive = chat.id === currentChatId;
                const preview = chat.messages.length > 0 
                    ? chat.messages[chat.messages.length - 1].content 
                    : '暂无消息';
                const time = formatTime(new Date(chat.updatedAt));
                
                return `
                    <div class="history-item ${isActive ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                        ${escapeHtml(chat.title)}
                    </div>
                `;
            }).join('');
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const chat = getCurrentChat();
            
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `
                    <div class="welcome-screen">
                        <h1>小核 AI 助手</h1>
                        <p>有什么可以帮助你的？</p>
                        <div class="suggestions">
                            <div class="suggestion-item" onclick="useSuggestion('帮我分析这段代码的性能')">
                                <div class="suggestion-title">💻 代码分析</div>
                                <div class="suggestion-desc">帮我分析这段代码的性能</div>
                            </div>
                            <div class="suggestion-item" onclick="useSuggestion('解释一下Java中的异常处理机制')">
                                <div class="suggestion-title">📚 技术问题</div>
                                <div class="suggestion-desc">解释一下Java中的异常处理机制</div>
                            </div>
                            <div class="suggestion-item" onclick="useSuggestion('帮我写一个简单的Python爬虫')">
                                <div class="suggestion-title">🔧 编写代码</div>
                                <div class="suggestion-desc">帮我写一个简单的Python爬虫</div>
                            </div>
                            <div class="suggestion-item" onclick="useSuggestion('如何优化数据库查询性能')">
                                <div class="suggestion-title">🚀 性能优化</div>
                                <div class="suggestion-desc">如何优化数据库查询性能</div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = chat.messages.map(msg => {
                const isUser = msg.role === 'user';
                const time = formatTime(new Date(msg.timestamp));
                
                return `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${isUser ? '👤' : '⚛️'}</div>
                        <div class="message-content">
                            ${renderMessageFiles(msg)}
                            <p>${escapeHtml(msg.content)}</p>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        function renderMessageFiles(msg) {
            if (!msg.files || msg.files.length === 0) return '';
            
            return msg.files.map(f => {
                const isImage = f.type && f.type.startsWith('image/');
                const dataUrl = `data:${f.type};base64,${f.data}`;
                
                if (isImage) {
                    return `<div class="message-file"><img class="thumbnail" src="${dataUrl}" alt="${escapeHtml(f.name)}" onclick="openImagePreview('${dataUrl}')"></div>`;
                }
                
                return `
                    <div class="message-file">
                        <span class="file-icon-big">${getFileIcon(f.name)}</span>
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(f.name)}</div>
                            <div class="file-download">${formatFileSize(f.size)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // 工具函数
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            updateSendButton();
        }
        
        function updateSendButton() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            
            if (input.value.trim().length > 0 || pendingFiles.length > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('mainContent');
            
            sidebar.classList.toggle('collapsed');
            main.classList.toggle('expanded');
        }
        
        function useSuggestion(text) {
            const input = document.getElementById('messageInput');
            input.value = text;
            input.focus();
            updateSendButton();
        }
        
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="message-avatar">⚛️</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function addSystemMessage(content) {
            const container = document.getElementById('messagesContainer');
            const time = formatTime(new Date());
            
            const systemMsg = document.createElement('div');
            systemMsg.style.textAlign = 'center';
            systemMsg.style.color = '#666';
            systemMsg.style.fontSize = '13px';
            systemMsg.style.margin = '16px 0';
            systemMsg.style.padding = '8px';
            systemMsg.style.background = '#f9f9f9';
            systemMsg.style.borderRadius = '6px';
            systemMsg.textContent = `${content} - ${time}`;
            
            container.appendChild(systemMsg);
            container.scrollTop = container.scrollHeight;
        }
        
        // 存储
        function saveChats() {
            localStorage.setItem('chatHistory', JSON.stringify(chats));
            localStorage.setItem('currentChatId', currentChatId);
        }
        
        function loadChats() {
            const savedChats = localStorage.getItem('chatHistory');
            const savedChatId = localStorage.getItem('currentChatId');
            
            if (savedChats) {
                chats = JSON.parse(savedChats);
            }
            
            if (savedChatId) {
                currentChatId = savedChatId;
            }
        }
        
        function clearHistory() {
            if (confirm('确定要清空所有对话吗？')) {
                chats = [];
                localStorage.removeItem('chatHistory');
                localStorage.removeItem('currentChatId');
                createNewChat();
            }
        }
        
        function exportChat() {
            const chat = getCurrentChat();
            if (!chat || chat.messages.length === 0) {
                alert('当前对话为空，无法导出');
                return;
            }
            
            let content = `对话导出 - ${chat.title}\n`;
            content += `导出时间: ${new Date().toLocaleString()}\n`;
            content += `服务器: ${API_BASE_URL}\n`;
            content += `================================\n\n`;
            
            chat.messages.forEach(msg => {
                const role = msg.role === 'user' ? '用户' : '小核';
                content += `[${role}] ${formatTime(new Date(msg.timestamp))}\n`;
                content += `${msg.content}\n`;
                content += `--------------------------------\n\n`;
            });
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `对话_${chat.title}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        // ========== 文件上传 ==========

        let pendingFiles = [];

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            pendingFiles = files;
            renderFilePreview();
            // 自动增高输入框
            autoResize(document.getElementById('messageInput'));
        }

        function renderFilePreview() {
            const area = document.getElementById('filePreviewArea');
            if (pendingFiles.length === 0) {
                area.innerHTML = '';
                return;
            }
            area.innerHTML = pendingFiles.map((f, i) => {
                const size = formatFileSize(f.size);
                return `
                    <div class="file-preview">
                        <span class="file-icon">${getFileIcon(f.name)}</span>
                        <span class="file-name">${escapeHtml(f.name)}</span>
                        <span class="file-size">${size}</span>
                        <span class="remove-file" onclick="removeFile(${i})">✕</span>
                    </div>
                `;
            }).join('');
        }

        function removeFile(index) {
            pendingFiles.splice(index, 1);
            renderFilePreview();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
            return (bytes / 1048576).toFixed(1) + 'MB';
        }

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) return '🖼️';
            if (['pdf'].includes(ext)) return '📕';
            if (['doc','docx'].includes(ext)) return '📄';
            if (['xls','xlsx','csv'].includes(ext)) return '📊';
            if (['zip','rar','7z','tar','gz'].includes(ext)) return '📦';
            if (['py','js','ts','java','go','rs','c','cpp','h','html','css','json','xml','yaml','yml'].includes(ext)) return '💻';
            return '📎';
        }

        function openImagePreview(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('previewImage');
            img.src = src;
            modal.classList.add('active');
        }

        function closeImagePreview() {
            document.getElementById('imageModal').classList.remove('active');
            document.getElementById('previewImage').src = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
