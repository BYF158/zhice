<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小核聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: #f5f7fa;
            border-right: 1px solid #e1e8ed;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #e1e8ed;
        }

        .sidebar-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            border: none;
            font-size: 14px;
            color: #666;
        }

        .sidebar-tab.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .sidebar-tab:hover {
            background: #5568d3;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* 聊天历史列表 */
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e1e8ed;
        }

        .history-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .history-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .history-item-title {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .history-item-preview {
            font-size: 12px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-time {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* 主聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-header-info h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #666;
        }

        .chat-header-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #fa5252;
        }

        .btn-export {
            background: #51cf66;
            color: white;
            margin-right: 8px;
        }

        .btn-export:hover {
            background: #40c057;
        }

        /* 消息列表 */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
            order: 2;
        }

        .message.assistant .message-avatar {
            background: #764ba2;
            color: white;
            order: 0;
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-top-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e1e8ed;
            border-top-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .message.assistant .message-time {
            color: #666;
        }

        /* 图片消息 */
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 文件消息 */
        .message-file {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-file-icon {
            font-size: 24px;
        }

        .message-file-info {
            display: flex;
            flex-direction: column;
        }

        .message-file-name {
            font-size: 13px;
            font-weight: bold;
        }

        .message-file-size {
            font-size: 11px;
            opacity: 0.7;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e8ed;
        }

        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-toolbar button {
            padding: 8px 12px;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-toolbar button:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            height: 50px;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 0 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        /* 文件上传对话框 */
        .file-upload-area {
            display: none;
            padding: 20px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload-area:hover {
            background: #f0f4ff;
        }

        .file-upload-area.active {
            display: block;
        }

        .file-upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 80%;
            }
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* 图片预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>小核 ⚛️</h1>
                <p>AI助手 - 随时待命</p>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" onclick="switchTab('history')">历史记录</button>
                <button class="sidebar-tab" onclick="switchTab('files')">文件</button>
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <!-- 历史记录内容 -->
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="avatar">⚛️</div>
                    <div>
                        <h2>小核</h2>
                        <p>在线 · 服务器: 120.27.244.95</p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="btn-export" onclick="exportHistory()">导出对话</button>
                    <button class="btn-clear" onclick="clearHistory()">清空历史</button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- 消息会在这里动态生成 -->
            </div>

            <div class="input-area">
                <div class="input-toolbar">
                    <button onclick="toggleFileUpload()">
                        📎 上传文件
                    </button>
                    <button onclick="insertImage()">
                        🖼️ 插入图片
                    </button>
                    <button onclick="insertCode()">
                        💻 代码块
                    </button>
                </div>

                <div class="file-upload-area" id="fileUploadArea">
                    <p>点击或拖拽文件到这里</p>
                    <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
                    <button onclick="document.getElementById('fileInput').click()">选择文件</button>
                </div>

                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="输入消息..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-button" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div class="modal" id="imageModal" onclick="closeModal()">
        <button class="modal-close">&times;</button>
        <img class="modal-content" id="modalImage" src="" alt="预览">
    </div>

    <script>
        // 全局变量
        let currentSessionId = null;
        let sessions = [];
        let uploadedFiles = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            renderSessions();
            if (sessions.length === 0) {
                createNewSession();
            } else {
                loadSession(sessions[0].id);
            }
        });

        // 存储管理
        function saveToStorage() {
            localStorage.setItem('chatSessions', JSON.stringify(sessions));
            localStorage.setItem('currentSessionId', currentSessionId);
        }

        function loadFromStorage() {
            const savedSessions = localStorage.getItem('chatSessions');
            const savedSessionId = localStorage.getItem('currentSessionId');
            
            if (savedSessions) {
                sessions = JSON.parse(savedSessions);
            }
            
            if (savedSessionId) {
                currentSessionId = parseInt(savedSessionId);
            }
        }

        // 会话管理
        function createNewSession() {
            const newSession = {
                id: Date.now(),
                title: '新对话',
                messages: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            sessions.unshift(newSession);
            currentSessionId = newSession.id;
            saveToStorage();
            renderSessions();
            renderMessages();
        }

        function loadSession(sessionId) {
            currentSessionId = sessionId;
            saveToStorage();
            renderSessions();
            renderMessages();
        }

        function deleteSession(sessionId) {
            sessions = sessions.filter(s => s.id !== sessionId);
            
            if (currentSessionId === sessionId) {
                if (sessions.length > 0) {
                    currentSessionId = sessions[0].id;
                } else {
                    createNewSession();
                }
            }
            
            saveToStorage();
            renderSessions();
            renderMessages();
        }

        function getCurrentSession() {
            return sessions.find(s => s.id === currentSessionId);
        }

        // 渲染会话列表
        function renderSessions() {
            const container = document.getElementById('sidebarContent');
            
            container.innerHTML = sessions.map(session => {
                const isActive = session.id === currentSessionId;
                const preview = session.messages.length > 0 
                    ? session.messages[session.messages.length - 1].content 
                    : '暂无消息';
                const time = formatTime(new Date(session.updatedAt));
                
                return `
                    <div class="history-item ${isActive ? 'active' : ''}" onclick="loadSession(${session.id})">
                        <div class="history-item-title">${escapeHtml(session.title)}</div>
                        <div class="history-item-preview">${escapeHtml(preview.substring(0, 30))}</div>
                        <div class="history-item-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染消息
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const session = getCurrentSession();
            
            if (!session || session.messages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: #999; margin-top: 50px;">
                        <div style="font-size: 48px; margin-bottom: 20px;">💬</div>
                        <p>开始与小核对话吧！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = session.messages.map(msg => {
                const isUser = msg.role === 'user';
                const time = formatTime(new Date(msg.timestamp));
                
                let contentHtml = escapeHtml(msg.content);
                
                // 处理图片
                if (msg.image) {
                    contentHtml = `
                        <div>
                            ${contentHtml}
                            <img class="message-image" src="${msg.image}" onclick="openModal('${msg.image}')" alt="图片">
                        </div>
                    `;
                }
                
                // 处理文件
                if (msg.file) {
                    contentHtml = `
                        <div>
                            ${contentHtml}
                            <div class="message-file">
                                <span class="message-file-icon">📄</span>
                                <div class="message-file-info">
                                    <span class="message-file-name">${escapeHtml(msg.file.name)}</span>
                                    <span class="message-file-size">${formatFileSize(msg.file.size)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                // 处理代码块
                contentHtml = contentHtml.replace(/```(\w*)\n([\s\S]*?)```/g, 
                    '<pre style="background:#f4f4f4;padding:10px;border-radius:4px;overflow-x:auto;"><code>$2</code></pre>');
                
                return `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${isUser ? '👤' : '⚛️'}</div>
                        <div class="message-content">
                            ${contentHtml}
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content && uploadedFiles.length === 0) {
                return;
            }
            
            const session = getCurrentSession();
            if (!session) return;
            
            // 添加用户消息
            const userMessage = {
                role: 'user',
                content: content,
                timestamp: new Date().toISOString()
            };
            
            // 处理上传的文件
            if (uploadedFiles.length > 0) {
                uploadedFiles.forEach(file => {
                    if (file.type.startsWith('image/')) {
                        userMessage.image = file.data;
                    } else {
                        userMessage.file = {
                            name: file.name,
                            size: file.size,
                            type: file.type
                        };
                    }
                });
            }
            
            session.messages.push(userMessage);
            
            // 更新会话标题（使用第一条用户消息）
            if (session.messages.filter(m => m.role === 'user').length === 1) {
                session.title = content.substring(0, 20) || '新对话';
            }
            
            session.updatedAt = new Date().toISOString();
            saveToStorage();
            renderSessions();
            renderMessages();
            
            // 清空输入
            input.value = '';
            uploadedFiles = [];
            toggleFileUpload();
            
            // 模拟AI响应（实际使用时替换为API调用）
            showTypingIndicator();
            setTimeout(() => {
                hideTypingIndicator();
                generateResponse(content, session);
            }, 1000 + Math.random() * 2000);
        }

        // 生成AI响应（模拟）
        function generateResponse(userMessage, session) {
            const responses = [
                "收到！让我来帮你分析这个问题。",
                "这是一个很好的问题！让我详细说明一下。",
                "我理解你的需求了，这里有一些建议...",
                "让我查一下相关信息再回答你。",
                "这个问题涉及到多个方面，我来逐一说明。"
            ];
            
            const aiMessage = {
                role: 'assistant',
                content: responses[Math.floor(Math.random() * responses.length)],
                timestamp: new Date().toISOString()
            };
            
            session.messages.push(aiMessage);
            session.updatedAt = new Date().toISOString();
            saveToStorage();
            renderSessions();
            renderMessages();
        }

        // 文件上传处理
        function toggleFileUpload() {
            const area = document.getElementById('fileUploadArea');
            area.classList.toggle('active');
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            processFiles(files);
        }

        function processFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    uploadedFiles.push({
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result
                    });
                };
                
                if (file.type.startsWith('image/')) {
                    reader.readAsDataURL(file);
                } else {
                    uploadedFiles.push({
                        name: file.name,
                        size: file.size,
                        type: file.type
                    });
                }
            });
        }

        // 插入图片
        function insertImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => processFiles(e.target.files);
            input.click();
        }

        // 插入代码块
        function insertCode() {
            const input = document.getElementById('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            
            const codeBlock = '```\n// 在这里输入代码\n```';
            
            input.value = text.substring(0, start) + codeBlock + text.substring(end);
            input.focus();
        }

        // 键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                sessions = [];
                createNewSession();
                localStorage.removeItem('chatSessions');
                localStorage.removeItem('currentSessionId');
            }
        }

        // 导出对话
        function exportHistory() {
            const session = getCurrentSession();
            if (!session || session.messages.length === 0) {
                alert('当前对话为空，无法导出');
                return;
            }
            
            let content = `对话导出 - ${session.title}\n`;
            content += `导出时间: ${new Date().toLocaleString()}\n`;
            content += `================================\n\n`;
            
            session.messages.forEach(msg => {
                const role = msg.role === 'user' ? '用户' : '小核';
                content += `[${role}] ${formatTime(new Date(msg.timestamp))}\n`;
                content += `${msg.content}\n`;
                if (msg.image) content += `[图片: ${msg.image.substring(0, 50)}...]\n`;
                if (msg.file) content += `[文件: ${msg.file.name}]\n`;
                content += `--------------------------------\n\n`;
            });
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `对话_${session.title}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 切换侧边栏标签
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.sidebar-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 这里可以根据不同标签显示不同内容
            if (tab === 'files') {
                alert('文件功能开发中...');
            }
        }

        // 显示/隐藏输入指示器
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="message-avatar">⚛️</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 图片预览
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = src;
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
        }

        // 工具函数
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 拖拽上传
        const dropArea = document.getElementById('fileUploadArea');
        if (dropArea) {
            dropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropArea.style.background = '#f0f4ff';
            });
            
            dropArea.addEventListener('dragleave', () => {
                dropArea.style.background = '';
            });
            
            dropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dropArea.style.background = '';
                processFiles(e.dataTransfer.files);
            });
        }
    </script>
</body>
</html>
