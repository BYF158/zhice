<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小核聊天助手 - 实时连接</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: #f5f7fa;
            border-right: 1px solid #e1e8ed;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #e1e8ed;
        }

        .sidebar-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            border: none;
            font-size: 14px;
            color: #666;
        }

        .sidebar-tab.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .sidebar-tab:hover {
            background: #5568d3;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e1e8ed;
        }

        .history-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .history-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .history-item-title {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .history-item-preview {
            font-size: 12px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-time {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* 主聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #51cf66;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: #ff6b6b;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-header-info h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #666;
        }

        .chat-header-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #fa5252;
        }

        .btn-export {
            background: #51cf66;
            color: white;
            margin-right: 8px;
        }

        .btn-export:hover {
            background: #40c057;
        }

        /* 消息列表 */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
            order: 2;
        }

        .message.assistant .message-avatar {
            background: #764ba2;
            color: white;
            order: 0;
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-top-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e1e8ed;
            border-top-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .message.assistant .message-time {
            color: #666;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e8ed;
        }

        .input-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-toolbar button {
            padding: 8px 12px;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-toolbar button:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            height: 50px;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 0 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* 连接状态提示 */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .connection-status.connected {
            background: #51cf66;
            display: block;
        }

        .connection-status.disconnected {
            background: #ff6b6b;
            display: block;
        }

        .connection-status.connecting {
            background: #ffd43b;
            color: #333;
            display: block;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">
        连接状态: 未连接
    </div>

    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>小核 ⚛️</h1>
                <p>AI助手 - 实时连接</p>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active">历史记录</button>
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <!-- 历史记录内容 -->
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="avatar">⚛️</div>
                    <div>
                        <h2>小核</h2>
                        <p>
                            在线 · 
                            <span id="serverAddress">120.27.244.95:8080</span>
                            <span class="status-indicator" id="statusIndicator"></span>
                        </p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="btn-export" onclick="exportHistory()">导出对话</button>
                    <button class="btn-clear" onclick="clearHistory()">清空历史</button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: #999; margin-top: 50px;">
                    <div style="font-size: 48px; margin-bottom: 20px;">💬</div>
                    <p>连接到服务器中...</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="输入消息..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-button" id="sendButton" onclick="sendMessage()" disabled>发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE_URL = 'http://120.27.244.95:8080';
        const WS_URL = 'ws://120.27.244.95:8080';
        
        // 全局变量
        let currentSessionId = null;
        let sessions = [];
        let ws = null;
        let isConnected = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initWebSocket();
            loadFromStorage();
            renderSessions();
            
            if (sessions.length === 0) {
                createNewSession();
            } else {
                loadSession(sessions[0].id);
            }
        });
        
        // WebSocket连接
        function initWebSocket() {
            const sessionId = generateSessionId();
            updateConnectionStatus('connecting', '连接中...');
            
            ws = new WebSocket(`${WS_URL}/ws/${sessionId}`);
            
            ws.onopen = () => {
                isConnected = true;
                updateConnectionStatus('connected', '已连接');
                document.getElementById('sendButton').disabled = false;
                document.getElementById('statusIndicator').classList.remove('disconnected');
                addSystemMessage('已连接到小核服务器');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                receiveMessage(data);
            };
            
            ws.onclose = () => {
                isConnected = false;
                updateConnectionStatus('disconnected', '已断开');
                document.getElementById('sendButton').disabled = true;
                document.getElementById('statusIndicator').classList.add('disconnected');
                addSystemMessage('与服务器的连接已断开，正在重连...');
                
                // 自动重连
                setTimeout(() => {
                    initWebSocket();
                }, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addSystemMessage('连接错误，请检查网络');
            };
        }
        
        function updateConnectionStatus(status, message) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = `connection-status ${status}`;
            statusEl.textContent = `连接状态: ${message}`;
            
            if (status === 'connected') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }
        
        // 消息发送
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !isConnected) {
                return;
            }
            
            const session = getCurrentSession();
            if (!session) return;
            
            // 添加用户消息
            const userMessage = {
                role: 'user',
                content: content,
                timestamp: new Date().toISOString()
            };
            
            session.messages.push(userMessage);
            
            // 更新会话标题
            if (session.messages.filter(m => m.role === 'user').length === 1) {
                session.title = content.substring(0, 20) || '新对话';
            }
            
            session.updatedAt = new Date().toISOString();
            saveToStorage();
            renderSessions();
            renderMessages();
            
            // 清空输入
            input.value = '';
            
            // 发送到服务器
            try {
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: content,
                        session_id: session.id
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const data = await response.json();
                
                // 添加AI回复
                const aiMessage = {
                    role: 'assistant',
                    content: data.content,
                    timestamp: data.timestamp
                };
                
                session.messages.push(aiMessage);
                session.updatedAt = new Date().toISOString();
                saveToStorage();
                renderSessions();
                renderMessages();
                
            } catch (error) {
                console.error('Error sending message:', error);
                addSystemMessage('发送消息失败，请重试');
            }
        }
        
        function receiveMessage(data) {
            const session = getCurrentSession();
            if (!session) return;
            
            const message = {
                role: data.role,
                content: data.content,
                timestamp: data.timestamp
            };
            
            session.messages.push(message);
            session.updatedAt = new Date().toISOString();
            saveToStorage();
            renderSessions();
            renderMessages();
        }
        
        // 会话管理
        function generateSessionId() {
            return Date.now().toString();
        }
        
        function createNewSession() {
            const newSession = {
                id: generateSessionId(),
                title: '新对话',
                messages: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            sessions.unshift(newSession);
            currentSessionId = newSession.id;
            saveToStorage();
            renderSessions();
            renderMessages();
        }
        
        function loadSession(sessionId) {
            currentSessionId = sessionId;
            saveToStorage();
            renderSessions();
            renderMessages();
        }
        
        function getCurrentSession() {
            return sessions.find(s => s.id === currentSessionId);
        }
        
        // 渲染
        function renderSessions() {
            const container = document.getElementById('sidebarContent');
            
            container.innerHTML = sessions.map(session => {
                const isActive = session.id === currentSessionId;
                const preview = session.messages.length > 0 
                    ? session.messages[session.messages.length - 1].content 
                    : '暂无消息';
                const time = formatTime(new Date(session.updatedAt));
                
                return `
                    <div class="history-item ${isActive ? 'active' : ''}" onclick="loadSession('${session.id}')">
                        <div class="history-item-title">${escapeHtml(session.title)}</div>
                        <div class="history-item-preview">${escapeHtml(preview.substring(0, 30))}</div>
                        <div class="history-item-time">${time}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const session = getCurrentSession();
            
            if (!session || session.messages.length === 0) {
                if (isConnected) {
                    container.innerHTML = `
                        <div style="text-align: center; color: #999; margin-top: 50px;">
                            <div style="font-size: 48px; margin-bottom: 20px;">💬</div>
                            <p>开始与小核对话吧！</p>
                        </div>
                    `;
                }
                return;
            }
            
            container.innerHTML = session.messages.map(msg => {
                const isUser = msg.role === 'user';
                const time = formatTime(new Date(msg.timestamp));
                
                return `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${isUser ? '👤' : '⚛️'}</div>
                        <div class="message-content">
                            ${escapeHtml(msg.content)}
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(content) {
            const container = document.getElementById('messagesContainer');
            const time = formatTime(new Date());
            
            const systemMsg = document.createElement('div');
            systemMsg.style.textAlign = 'center';
            systemMsg.style.color = '#666';
            systemMsg.style.fontSize = '12px';
            systemMsg.style.margin = '10px 0';
            systemMsg.style.padding = '5px 10px';
            systemMsg.style.background = '#f0f0f0';
            systemMsg.style.borderRadius = '4px';
            systemMsg.innerHTML = `${content} - ${time}`;
            
            container.appendChild(systemMsg);
            container.scrollTop = container.scrollHeight;
        }
        
        // 存储
        function saveToStorage() {
            localStorage.setItem('chatSessions', JSON.stringify(sessions));
            localStorage.setItem('currentSessionId', currentSessionId);
        }
        
        function loadFromStorage() {
            const savedSessions = localStorage.getItem('chatSessions');
            const savedSessionId = localStorage.getItem('currentSessionId');
            
            if (savedSessions) {
                sessions = JSON.parse(savedSessions);
            }
            
            if (savedSessionId) {
                currentSessionId = savedSessionId;
            }
        }
        
        // 工具函数
        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                sessions = [];
                localStorage.removeItem('chatSessions');
                localStorage.removeItem('currentSessionId');
                createNewSession();
            }
        }
        
        function exportHistory() {
            const session = getCurrentSession();
            if (!session || session.messages.length === 0) {
                alert('当前对话为空，无法导出');
                return;
            }
            
            let content = `对话导出 - ${session.title}\n`;
            content += `导出时间: ${new Date().toLocaleString()}\n`;
            content += `服务器: ${API_BASE_URL}\n`;
            content += `================================\n\n`;
            
            session.messages.forEach(msg => {
                const role = msg.role === 'user' ? '用户' : '小核';
                content += `[${role}] ${formatTime(new Date(msg.timestamp))}\n`;
                content += `${msg.content}\n`;
                content += `--------------------------------\n\n`;
            });
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `对话_${session.title}_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
